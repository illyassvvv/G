name: streamgo_tv
description: StreamGo IPTV Player App
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.0

  # Persistent storage (favorites + settings)
  shared_preferences: ^2.2.2

  # Video player core
  video_player: ^2.8.3

  # Full-featured player UI (controls, fullscreen, etc.)
  chewie: ^1.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
